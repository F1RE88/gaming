<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="gaming.png">
    <style>
        /* General Page Styling */
        body {
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* Stacks the code block on top of the buttons */
            justify-content: center;
            align-items: center;
            gap: 30px; /* Space between the code block and the buttons */
            background: radial-gradient(circle at center, #1e1e2f 0%, #0f0f1a 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-y: auto; /* Allows scrolling if screens are small */
            box-sizing: border-box;
        }

        /* --- CODE CARD COMPONENT STYLES --- */
        .code-card-container {
            background-color: #111111;
            border-radius: 32px;
            padding: 24px 36px;
            max-width: 650px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .code-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .code-card-title {
            color: #ffffff;
            font-weight: 700;
            font-size: 16px;
        }

        .code-card-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .card-action-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease, background-color 0.2s ease;
        }

        .card-action-btn:hover {
            opacity: 0.8;
            background-color: rgba(255, 255, 255, 0.08);
        }

        .code-card-body {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 15px;
            line-height: 1.6;
            color: #ffffff;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .token-keyword {
            color: #569cd6;
        }

        .token-object {
            color: #e06c75;
        }

        /* --- GAMING BUTTONS CONTAINER STYLES --- */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .btn-link {
            text-decoration: none;
            width: 100%;
        }

        .game-btn {
            width: 100%;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #2c2c44 0%, #1a1a2e 100%);
            border: 2px solid #3f3f5f;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px; 
        }

        .game-btn i {
            font-size: 1.2rem;
        }

        .game-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .game-btn:hover {
            transform: translateY(-4px);
            border-color: #00ffcc;
            color: #00ffcc;
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.3);
        }

        .game-btn:hover::before {
            transform: translateX(100%);
        }

        .game-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 255, 204, 0.2);
        }
    </style>
</head>
<body>

    <div class="code-card-container">
        <div class="code-card-header">
            <span class="code-card-title">JavaScript</span>
            <div class="code-card-actions">
                <button class="card-action-btn" id="download-btn" title="Download script">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
                
                <button class="card-action-btn" id="copy-btn" title="Copy code">
                    <svg id="copy-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <svg id="check-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4cdf7c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </button>
            </div>
        </div>
        
        <div class="code-card-body">
            <code id="code-snippet">javascript:<span class="token-keyword">(function</span>() { <span class="token-object">document</span>.documentElement.requestFullscreen(); })();</code>
        </div>
    </div>

    <div class="button-container">
        <a class="btn-link" href="https://play.geforcenow.com/">
            <button class="game-btn"><i class="fa-solid fa-bolt"></i> GeForce Now</button>
        </a>
        <a class="btn-link" href="https://gam.onl/">
            <button class="game-btn"><i class="fa-solid fa-gamepad"></i> Gam.onl</button>
        </a>
        <a class="btn-link" href="http://crazygames.com/">
            <button class="game-btn"><i class="fa-solid fa-fire"></i> Crazy Games</button>
        </a>
        <a class="btn-link" href="https://now.gg/">
            <button class="game-btn"><i class="fa-solid fa-play"></i> Now GG</button>
        </a>
        <a class="btn-link" href="https://web.cloudmoonapp.com/ar/">
            <button class="game-btn"><i class="fa-solid fa-cloud-moon"></i> Cloud Moon</button>
        </a>
        <a class="btn-link" href="https://f1re88.github.io/quaran-game/">
            <button class="game-btn"><i class="fa-solid fa-kaaba"></i> أقراء باسم ربك اللذي خلق</button>
        </a>
    </div>

    <script>
        // Copy to Clipboard Feature
        document.getElementById('copy-btn').addEventListener('click', function() {
            const codeText = document.getElementById('code-snippet').innerText;
            
            navigator.clipboard.writeText(codeText).then(() => {
                const copyIcon = document.getElementById('copy-icon');
                const checkIcon = document.getElementById('check-icon');
                
                copyIcon.style.display = 'none';
                checkIcon.style.display = 'block';
                
                setTimeout(() => {
                    copyIcon.style.display = 'block';
                    checkIcon.style.display = 'none';
                }, 2000);
            }).catch(err => {
                console.error('Could not copy text: ', err);
            });
        });
    </script>
</body>
</html>
